# fly.toml file generated for cartracker on 2023-03-06T21:15:19-06:00

app = "cartracker"
kill_signal = "SIGINT"
kill_timeout = 5

[env]

[experimental]
  auto_rollback = true

[build]
  dockerfile = "Dockerfile"

[http_service]
  http_checks = []
  internal_port = 5000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []
  force_https = true

  [http_service.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"
